name: "Step II: Render editorial report"

on:
  workflow_run:
    workflows: ["Step I: Collect editorials"]
    types: [completed]

  workflow_dispatch:
    inputs:
      date:
        description: "Report date YYYY-MM-DD. Leave empty for today in Europe/Stockholm."
        required: false
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Wait until 07:05 Swedish time after scheduled collection
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'schedule' }}
        run: |
          TARGET_EPOCH=$(TZ=Europe/Stockholm date -d "$(TZ=Europe/Stockholm date +%F) 07:05" +%s)
          NOW_EPOCH=$(date +%s)

          if [ "$NOW_EPOCH" -lt "$TARGET_EPOCH" ]; then
            sleep $((TARGET_EPOCH - NOW_EPOCH))
          fi

      - name: Render Markdown report
        id: render_report
        env:
          INPUT_DATE: ${{ github.event_name == 'workflow_dispatch' && inputs.date || '' }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            RUN_DATE="$INPUT_DATE"
          else
            RUN_DATE=$(TZ=Europe/Stockholm date +%F)
          fi

          RUN_STAMP=$(printf "%s" "$RUN_DATE" | tr -d "-")
          CSV_FILE="outputs/ledartexter/csv/editorials_${RUN_STAMP}.csv"
          MD_FILE="outputs/ledartexter/md/editorials_${RUN_STAMP}.md"

          if [ ! -f "$CSV_FILE" ]; then
            echo "Expected CSV file does not exist: $CSV_FILE" >&2
            exit 1
          fi

          python3 render_editorial_report.py \
            --date "$RUN_DATE" \
            --input "$CSV_FILE" \
            --output "$MD_FILE"

          echo "run_date=$RUN_DATE" >> "$GITHUB_OUTPUT"
          echo "run_stamp=$RUN_STAMP" >> "$GITHUB_OUTPUT"
          echo "output_file=$MD_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v7
        with:
          name: editorial_report_${{ steps.render_report.outputs.run_stamp }}
          path: ${{ steps.render_report.outputs.output_file }}
          retention-days: 30

      - name: Commit Markdown report to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add outputs/ledartexter/md/
          git commit -m "Add editorial report for ${{ steps.render_report.outputs.run_date }}" || echo "No changes to commit"
          git push
